name: Build, Test & Deploy

on:
  push:
    branches:
      - main
      - develop
      - 'release/**'
  pull_request:
    branches:
      - main
      - develop

env:
  REGISTRY: ghcr.io
  NODE_ENV: production

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: ats_user
          POSTGRES_PASSWORD: ats_test_password
          POSTGRES_DB: ats_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linting
        run: npm run lint
        continue-on-error: true

      - name: Build application
        run: npm run build

      - name: Run tests
        run: npm run test:cov
        env:
          DATABASE_URL: postgresql://ats_user:ats_test_password@localhost:5432/ats_test

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/coverage-final.json
          flags: unittests
          name: codecov-umbrella
        continue-on-error: true

  generate-openapi:
    name: Generate OpenAPI Spec
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build

      - name: Start server in background
        env:
          PORT: '3001'
        run: |
          npm start &
          sleep 8

      - name: Fetch OpenAPI spec
        run: |
          mkdir -p openapi
          curl -s http://localhost:3001/api-json > openapi/openapi.json
          # Verify spec was generated
          if [ ! -f openapi/openapi.json ] || [ ! -s openapi/openapi.json ]; then
            echo "Failed to generate OpenAPI spec"
            exit 1
          fi
          echo "✓ OpenAPI spec generated successfully"

      - name: Validate OpenAPI spec
        run: |
          npm install -g @apidevtools/swagger-cli
          swagger-cli validate openapi/openapi.json

      - name: Upload OpenAPI artifact
        uses: actions/upload-artifact@v3
        with:
          name: openapi-spec
          path: openapi/openapi.json
          retention-days: 90

  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [build-and-test, docker-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    environment:
      name: staging
      url: https://staging-api.example.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to staging
        run: |
          echo "Deploying to staging environment..."
          # Replace with your actual deployment script
          # Example: kubectl apply -f k8s/staging/
          # Or: docker pull ... && docker run ...
          echo "✓ Deployment complete"

      - name: Run smoke tests
        run: |
          echo "Running smoke tests..."
          # Replace with your smoke test script
          curl -f https://staging-api.example.com/health || exit 1
          echo "✓ Smoke tests passed"

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-and-test, docker-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://api.example.com
    concurrency:
      group: production-deployment
      cancel-in-progress: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Notify deployment start
        run: |
          echo "🚀 Starting production deployment..."
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref }}"

      - name: Deploy to production
        run: |
          echo "Deploying to production environment..."
          # Replace with your actual deployment script
          # Example: kubectl apply -f k8s/production/
          echo "✓ Deployment complete"

      - name: Run health checks
        run: |
          echo "Running health checks..."
          curl -f https://api.example.com/health || exit 1
          curl -f https://api.example.com/readiness || exit 1
          echo "✓ Health checks passed"

      - name: Notify deployment success
        run: |
          echo "✅ Production deployment successful!"
