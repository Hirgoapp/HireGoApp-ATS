# Deploy Business UI to Azure Static Web Apps.
#
# Prerequisites:
# 1. Create Static Web App in Azure (Framework: Custom), link this repo, or create empty SWA and copy deployment token.
# 2. GitHub → Secrets: AZURE_STATIC_WEB_APPS_API_TOKEN_BUSINESS (Deployment token from Azure portal)
# 3. GitHub → Variables: VITE_API_BASE_URL_BUSINESS (e.g. https://YOUR-API.azurewebsites.net/api/v1)

name: Azure — deploy Business UI (Static Web Apps)

on:
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    name: Build and deploy
    steps:
      - name: Require VITE_API_BASE_URL_BUSINESS variable
        if: ${{ vars.VITE_API_BASE_URL_BUSINESS == '' }}
        run: |
          echo 'Set repository variable VITE_API_BASE_URL_BUSINESS (e.g. https://YOUR-API.azurewebsites.net/api/v1)'
          exit 1

      - uses: actions/checkout@v4

      - name: Build and deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_BUSINESS }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend/business
          api_location: ''
          skip_api_build: true
          output_location: dist
          app_build_command: npm run build
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL_BUSINESS }}
          VITE_API_PROXY_TARGET: ${{ vars.VITE_API_BASE_URL_BUSINESS }}
