# Deploy Super Admin UI to Azure Static Web Apps.
#
# Prerequisites:
# 1. Create a second Static Web App in Azure (or use monorepo SWA with multiple apps — this workflow is the simple path).
# 2. GitHub → Secrets: AZURE_STATIC_WEB_APPS_API_TOKEN_SUPER_ADMIN
# 3. GitHub → Variables: VITE_API_BASE_URL_SUPER_ADMIN (e.g. https://YOUR-API.azurewebsites.net/api)

name: Azure — deploy Super Admin UI (Static Web Apps)

on:
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    name: Build and deploy
    steps:
      - name: Require VITE_API_BASE_URL_SUPER_ADMIN variable
        if: ${{ vars.VITE_API_BASE_URL_SUPER_ADMIN == '' }}
        run: |
          echo 'Set repository variable VITE_API_BASE_URL_SUPER_ADMIN (e.g. https://YOUR-API.azurewebsites.net/api)'
          exit 1

      - uses: actions/checkout@v4

      - name: Build and deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_SUPER_ADMIN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: frontend/super-admin
          api_location: ''
          skip_api_build: true
          output_location: dist
          app_build_command: npm run build
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL_SUPER_ADMIN }}
          VITE_API_PROXY_TARGET: ${{ vars.VITE_API_BASE_URL_SUPER_ADMIN }}
